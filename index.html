<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://lucide.dev/icons/crown.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pasay Chess Federation 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Space Grotesk', 'sans-serif'],
              display: ['Outfit', 'sans-serif'],
            },
            colors: {
              chess: {
                background: '#070B14',
                surface: '#10192A',
                card: '#172338',
                red: '#EF4444',
                gold: '#F59E0B',
                cyan: '#22D3EE',
              }
            },
            boxShadow: {
              glow: '0 20px 60px rgba(34, 211, 238, 0.18)',
            },
            keyframes: {
              'fade-rise': {
                '0%': { opacity: '0', transform: 'translateY(18px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            },
            animation: {
              'fade-rise': 'fade-rise 700ms ease forwards',
            }
          }
        }
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
